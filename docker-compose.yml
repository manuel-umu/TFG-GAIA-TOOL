networks:
  net-app:
    driver: bridge

services:
  mysql-db:
    image: mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: 24TFG.
    ports:
      - "3306:3306"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
    #networks:
    #  - net-app
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 5

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      mysql-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - net-app

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5000:80"
    networks:
      - net-app